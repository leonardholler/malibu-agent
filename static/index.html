<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malibu Agent — Luxury Real Estate Valuation</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #08080d;
  --surface: #111118;
  --surface2: #1a1a24;
  --surface3: #222230;
  --border: #262636;
  --border-light: #33334a;
  --text: #eaeaf2;
  --text-muted: #7c7c96;
  --text-dim: #55556a;
  --accent: #3b82f6;
  --accent-dim: rgba(59,130,246,0.12);
  --green: #22c55e;
  --green-dim: rgba(34,197,94,0.12);
  --red: #ef4444;
  --red-dim: rgba(239,68,68,0.12);
  --amber: #f59e0b;
  --amber-dim: rgba(245,158,11,0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Nav ─────────────────────────────────────── */
nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(8,8,13,0.88); backdrop-filter: blur(16px) saturate(180%);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  max-width: 1440px; margin: 0 auto; padding: 0 32px;
  display: flex; align-items: center; height: 56px; gap: 4px;
}
.nav-brand {
  font-weight: 700; font-size: 15px; letter-spacing: -0.5px;
  color: var(--text); margin-right: 28px;
  display: flex; align-items: center; gap: 8px;
}
.nav-brand::before {
  content: ''; display: block; width: 8px; height: 8px;
  background: var(--accent); border-radius: 2px;
}
.nav-link {
  color: var(--text-muted); font-size: 13px; font-weight: 500;
  padding: 6px 14px; border-radius: 20px; cursor: pointer;
  transition: all 0.15s; text-decoration: none; border: none; background: none;
}
.nav-link:hover { color: var(--text); background: var(--surface2); }
.nav-link.active { color: var(--accent); background: var(--accent-dim); }

/* ── Container ────────────────────────────────── */
.container { max-width: 1440px; margin: 0 auto; padding: 0 32px; }
.section { padding: 28px 0; }
.section-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-size: 16px; font-weight: 600; letter-spacing: -0.3px;
  color: var(--text);
}
.section-subtitle { font-size: 13px; color: var(--text-muted); }

/* ── Stats Bar ────────────────────────────────── */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px; padding: 20px 0 8px;
}
.stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
  transition: border-color 0.2s;
}
.stat:hover { border-color: var(--border-light); }
.stat-label {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500;
}
.stat-value { font-size: 24px; font-weight: 700; margin-top: 4px; letter-spacing: -0.5px; }
.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }

/* ── Map ──────────────────────────────────────── */
#map {
  height: 480px; border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden;
}
.leaflet-popup-content-wrapper {
  background: var(--surface) !important; color: var(--text) !important;
  border-radius: 10px !important; border: 1px solid var(--border) !important;
  box-shadow: var(--shadow-lg) !important;
}
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-content { margin: 12px 16px !important; font-size: 13px !important; line-height: 1.6 !important; }
.map-tooltip {
  background: var(--surface) !important; color: var(--text) !important;
  border: 1px solid var(--border) !important; border-radius: 8px !important;
  padding: 8px 12px !important; font-size: 12px !important;
  box-shadow: var(--shadow-lg) !important; line-height: 1.5 !important;
  white-space: nowrap;
}
.map-tooltip .tt-addr { font-weight: 600; font-size: 13px; margin-bottom: 2px; }
.map-tooltip .tt-prices { display: flex; gap: 12px; }
.map-tooltip .tt-delta { font-weight: 700; }
.map-legend {
  background: rgba(8,8,13,0.92); backdrop-filter: blur(8px);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; font-size: 11px; line-height: 1.9; color: var(--text-muted);
}
.map-legend-dot {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; margin-right: 6px; vertical-align: middle;
}

/* ── Charts ───────────────────────────────────── */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.chart-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
}
.chart-card h3 {
  font-size: 12px; color: var(--text-muted); text-transform: uppercase;
  letter-spacing: 0.6px; margin-bottom: 14px; font-weight: 500;
}

/* ── Neighborhood Comparison ──────────────────── */
.hood-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}
.hood-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px;
  transition: all 0.2s; position: relative; overflow: hidden;
}
.hood-card:hover { border-color: var(--border-light); transform: translateY(-1px); }
.hood-card-header {
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
.hood-color-bar {
  width: 4px; height: 32px; border-radius: 2px; flex-shrink: 0;
}
.hood-card-name { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
.hood-card-desc {
  font-size: 12px; color: var(--text-muted); line-height: 1.4;
  margin-bottom: 14px;
}
.hood-stats-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  margin-bottom: 12px;
}
.hood-stat {
  background: var(--surface2); border-radius: 6px; padding: 8px 10px;
}
.hood-stat-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
.hood-stat-value { font-size: 14px; font-weight: 600; margin-top: 1px; }
.hood-deal {
  background: var(--green-dim); border-radius: 8px; padding: 10px 12px;
  cursor: pointer; transition: background 0.15s;
}
.hood-deal:hover { background: rgba(34,197,94,0.18); }
.hood-deal-label { font-size: 10px; color: var(--green); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
.hood-deal-addr { font-size: 13px; font-weight: 500; margin-top: 2px; }
.hood-deal-diff { font-size: 12px; color: var(--green); font-weight: 600; }

/* ── Filters ──────────────────────────────────── */
.filters {
  display: flex; gap: 10px; padding: 16px 0 12px;
  flex-wrap: wrap; align-items: center;
  border-bottom: 1px solid var(--border);
}
.filters select, .filters input[type="text"] {
  background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 9px 14px; font-size: 13px; outline: none;
  transition: border-color 0.15s;
}
.filters select:focus, .filters input:focus { border-color: var(--accent); }
.filters select { cursor: pointer; }
.filter-label { font-size: 10px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.sort-pills { display: flex; gap: 4px; margin-left: auto; }
.sort-pill {
  background: transparent; border: 1px solid var(--border);
  color: var(--text-muted); padding: 8px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
}
.sort-pill:hover { border-color: var(--border-light); color: var(--text); }
.sort-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.search-box { position: relative; flex: 1; min-width: 200px; }
#search-input {
  width: 100%; background: var(--surface); color: var(--text);
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 9px 14px 9px 36px; font-size: 13px; outline: none;
}
#search-input:focus { border-color: var(--accent); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 14px; pointer-events: none;
}
.search-dropdown {
  display: none; position: absolute; top: 100%; left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); margin-top: 4px; z-index: 60;
  max-height: 300px; overflow-y: auto; box-shadow: var(--shadow-lg);
}
.search-dropdown.open { display: block; }
.search-item {
  padding: 10px 14px; cursor: pointer; font-size: 13px;
  border-bottom: 1px solid var(--border); display: flex;
  justify-content: space-between; align-items: center;
}
.search-item:last-child { border-bottom: none; }
.search-item:hover { background: var(--surface2); }
.search-item-price { color: var(--text-muted); font-size: 12px; }

/* ── Listings Grid ────────────────────────────── */
.listings-count { font-size: 13px; color: var(--text-muted); padding: 12px 0 8px; }
.listings { display: flex; flex-direction: column; gap: 2px; padding-bottom: 60px; }
.listing-card {
  display: grid;
  grid-template-columns: 88px 1fr 180px 130px 130px;
  align-items: center; gap: 14px;
  padding: 14px 20px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); cursor: pointer; transition: all 0.15s;
}
.listing-card:hover {
  background: var(--surface2); border-color: var(--accent);
  transform: translateY(-1px); box-shadow: 0 4px 16px rgba(59,130,246,0.08);
}
.listing-card.highlighted {
  border-color: var(--accent); background: rgba(59,130,246,0.06);
}
.listing-thumb-wrap {
  width: 88px; height: 62px; border-radius: 6px; overflow: hidden;
  background: var(--surface2); flex-shrink: 0; position: relative;
}
.listing-thumb {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.listing-thumb-placeholder {
  width: 100%; height: 100%; display: flex; align-items: center;
  justify-content: center; color: var(--text-dim); font-size: 20px;
}
.listing-info h3 { font-size: 14px; font-weight: 600; letter-spacing: -0.2px; }
.listing-info .meta { color: var(--text-muted); font-size: 12px; margin-top: 3px; }
.listing-hood {
  display: inline-block; font-size: 10px; padding: 2px 8px;
  border-radius: 4px; font-weight: 600; margin-top: 4px;
  letter-spacing: 0.2px;
}
.tag {
  display: inline-block; font-size: 10px; padding: 2px 6px;
  border-radius: 4px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.3px; margin-top: 4px;
}
.tag-ocean { background: rgba(59,130,246,0.12); color: #60a5fa; }
.tag-mtn { background: rgba(168,162,158,0.12); color: #a8a29e; }
.tag-land { background: rgba(245,158,11,0.12); color: #f59e0b; }
.tag-low { background: rgba(239,68,68,0.1); color: #f87171; }
.tag-kw { display: inline-block; padding: 2px 7px; font-size: 10px; border-radius: 4px; font-weight: 600; letter-spacing: 0.2px; }
.tag-kw-ocean { background: rgba(59,130,246,0.12); color: #60a5fa; }
.tag-kw-beach { background: rgba(6,182,212,0.12); color: #22d3ee; }
.tag-kw-noview { background: rgba(107,114,128,0.15); color: #9ca3af; }
.tag-kw-new { background: rgba(34,197,94,0.12); color: #4ade80; }
.tag-kw-burned { background: rgba(239,68,68,0.12); color: #f87171; }
.tag-kw-pool { background: rgba(139,92,246,0.12); color: #a78bfa; }
.tag-kw-gated { background: rgba(245,158,11,0.12); color: #fbbf24; }
.tag-kw-bluff { background: rgba(16,185,129,0.12); color: #34d399; }
.tag-kw-guest { background: rgba(236,72,153,0.12); color: #f472b6; }

.listing-prices { text-align: right; }
.listed-price { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.est-value { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
.listing-assessment { text-align: center; }
.badge {
  display: inline-block; padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.3px; text-transform: capitalize;
}
.badge.underpriced { background: var(--green-dim); color: var(--green); }
.badge.overpriced { background: var(--red-dim); color: var(--red); }
.badge.fair { background: rgba(136,136,160,0.08); color: var(--text-muted); }
.diff-pct { font-size: 18px; font-weight: 700; margin-top: 3px; letter-spacing: -0.3px; }
.diff-pct.negative { color: var(--green); }
.diff-pct.positive { color: var(--red); }
.listing-breakdown { display: flex; flex-direction: column; gap: 4px; font-size: 12px; }
.land-bar { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.land-bar-fill { height: 100%; background: var(--amber); border-radius: 3px; transition: width 0.3s; }
.breakdown-labels { display: flex; justify-content: space-between; color: var(--text-dim); font-size: 11px; }

/* ── Detail Modal ─────────────────────────────── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
  z-index: 100; justify-content: center; align-items: flex-start;
  padding: 40px 20px; overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; max-width: 760px; width: 100%;
  padding: 0; position: relative; box-shadow: var(--shadow-lg);
}
.modal-close {
  position: absolute; top: 16px; right: 16px; z-index: 10;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text-muted); width: 32px; height: 32px;
  border-radius: 50%; cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--surface3); color: var(--text); }
.modal-body { padding: 28px 32px 32px; }
.modal h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.4px; padding-right: 40px; }
.modal .address-meta { color: var(--text-muted); font-size: 13px; margin-top: 4px; }

/* Carousel */
.carousel { position: relative; margin: 0 -32px; }
.carousel-track {
  display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
  scrollbar-width: none; gap: 0;
}
.carousel-track::-webkit-scrollbar { display: none; }
.carousel-slide {
  min-width: 100%; scroll-snap-align: start;
  height: 320px; position: relative;
}
.carousel-slide img {
  width: 100%; height: 100%; object-fit: cover; display: block;
}
.carousel-btn {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.6); border: none; color: #fff;
  width: 36px; height: 36px; border-radius: 50%; font-size: 18px;
  cursor: pointer; z-index: 5; display: flex; align-items: center;
  justify-content: center; transition: background 0.15s; backdrop-filter: blur(4px);
}
.carousel-btn:hover { background: rgba(0,0,0,0.8); }
.carousel-btn.prev { left: 12px; }
.carousel-btn.next { right: 12px; }
.carousel-dots {
  position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
  display: flex; gap: 6px;
}
.carousel-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.4); border: none; cursor: pointer;
  transition: all 0.2s;
}
.carousel-dot.active { background: #fff; transform: scale(1.2); }
.no-images-placeholder {
  height: 200px; display: flex; align-items: center; justify-content: center;
  background: var(--surface2); color: var(--text-dim); font-size: 14px;
  margin: 0 -32px;
}

.valuation-hero {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
  margin: 20px 0; padding: 20px; background: var(--bg);
  border-radius: var(--radius); border: 1px solid var(--border);
}
.val-col h4 { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500; }
.val-col .big-num { font-size: 28px; font-weight: 700; margin-top: 4px; letter-spacing: -0.5px; }

.why-price-box {
  padding: 16px 18px; background: var(--accent-dim);
  border-radius: var(--radius); border-left: 3px solid var(--accent);
  font-size: 14px; line-height: 1.7; color: var(--text); margin: 16px 0;
}
.why-price-label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px;
  color: var(--accent); font-weight: 600; margin-bottom: 6px;
}

.reasoning-box {
  padding: 14px 16px; background: var(--bg); border-radius: var(--radius);
  font-size: 13px; line-height: 1.7; color: var(--text-muted); margin: 12px 0;
  border: 1px solid var(--border);
}
.modal-stat-grid {
  display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 16px 0;
}
.modal-stat-grid .stat { padding: 12px 14px; }
.modal-stat-grid .stat-label { font-size: 10px; }
.modal-stat-grid .stat-value { font-size: 17px; }

.listing-description {
  padding: 14px 16px; background: var(--bg); border-radius: var(--radius);
  font-size: 13px; line-height: 1.7; color: var(--text-muted); margin: 12px 0;
  max-height: 120px; overflow-y: auto; border: 1px solid var(--border);
}
.comps-section h3 {
  font-size: 12px; margin: 20px 0 10px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.6px; font-weight: 500;
}
.comp-row {
  display: grid; grid-template-columns: 1fr 100px 80px 80px;
  padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px;
  align-items: center;
}
.comp-row:last-child { border-bottom: none; }
.comp-row span:not(:first-child) { text-align: right; color: var(--text-muted); }
.comp-header { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.modal-actions { margin-top: 20px; display: flex; gap: 10px; }
.btn {
  padding: 10px 20px; border-radius: var(--radius-sm); font-size: 13px;
  font-weight: 600; cursor: pointer; border: 1px solid var(--border);
  transition: all 0.15s; letter-spacing: -0.1px;
}
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { opacity: 0.9; }
.btn-ghost { background: transparent; color: var(--text); }
.btn-ghost:hover { background: var(--surface2); }

/* ── Loading ──────────────────────────────────── */
.loading { text-align: center; padding: 80px 20px; color: var(--text-muted); }
.loading-spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.7s linear infinite;
  margin: 0 auto 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.skeleton {
  background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px;
}
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* ── Responsive ───────────────────────────────── */
@media (max-width: 1100px) {
  .listing-card { grid-template-columns: 80px 1fr 140px 120px; }
  .listing-card .listing-breakdown { display: none; }
}
@media (max-width: 900px) {
  .container { padding: 0 16px; }
  .nav-inner { padding: 0 16px; }
  .listing-card { grid-template-columns: 1fr; gap: 8px; padding: 14px 16px; }
  .listing-card .listing-thumb-wrap { display: none; }
  .listing-prices, .listing-assessment, .listing-breakdown { text-align: left; }
  .sort-pills { margin-left: 0; width: 100%; }
  .valuation-hero { grid-template-columns: 1fr; }
  .charts-grid { grid-template-columns: 1fr; }
  .hood-grid { grid-template-columns: 1fr; }
  #map { height: 300px; }
  .carousel-slide { height: 220px; }
  .modal-body { padding: 20px; }
  .carousel { margin: 0 -20px; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <span class="nav-brand">Malibu Agent</span>
    <a href="#map-section" class="nav-link active" onclick="navTo(this)">Map</a>
    <a href="#charts-section" class="nav-link" onclick="navTo(this)">Analytics</a>
    <a href="#hoods-section" class="nav-link" onclick="navTo(this)">Neighborhoods</a>
    <a href="#listings-section" class="nav-link" onclick="navTo(this)">Listings</a>
  </div>
</nav>

<div class="container">
  <div class="stats-bar" id="stats-bar">
    <div class="stat skeleton" style="height:72px"></div>
    <div class="stat skeleton" style="height:72px"></div>
    <div class="stat skeleton" style="height:72px"></div>
    <div class="stat skeleton" style="height:72px"></div>
    <div class="stat skeleton" style="height:72px"></div>
  </div>

  <section id="map-section" class="section">
    <div id="map"></div>
  </section>

  <section id="charts-section" class="section">
    <div class="section-header">
      <h2 class="section-title">Market Analytics</h2>
    </div>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Listed Price vs Fair Value</h3>
        <canvas id="scatter-chart" height="280"></canvas>
      </div>
      <div class="chart-card">
        <h3>Median $/sqft by Neighborhood</h3>
        <canvas id="ppsf-chart" height="280"></canvas>
      </div>
    </div>
  </section>

  <section id="hoods-section" class="section">
    <div class="section-header">
      <h2 class="section-title">Neighborhood Comparison</h2>
      <span class="section-subtitle">Micro-market intelligence across Malibu</span>
    </div>
    <div class="hood-grid" id="hood-grid">
      <div class="loading"><div class="loading-spinner"></div></div>
    </div>
  </section>

  <section id="listings-section" class="section">
    <div class="section-header">
      <h2 class="section-title">Active Listings</h2>
    </div>
    <div class="filters">
      <div class="filter-group">
        <span class="filter-label">Neighborhood</span>
        <select id="filter-hood"><option value="">All Neighborhoods</option></select>
      </div>
      <div class="filter-group">
        <span class="filter-label">Assessment</span>
        <select id="filter-assessment">
          <option value="">All</option>
          <option value="underpriced">Underpriced</option>
          <option value="fair">Fair Value</option>
          <option value="overpriced">Overpriced</option>
        </select>
      </div>
      <div class="search-box">
        <span class="search-icon">&#8981;</span>
        <input type="text" id="search-input" placeholder="Search address...">
        <div class="search-dropdown" id="search-dropdown"></div>
      </div>
      <div class="sort-pills">
        <button class="sort-pill active" data-sort="price_diff_pct">Best Value</button>
        <button class="sort-pill" data-sort="listed_price">Price</button>
        <button class="sort-pill" data-sort="dom">Newest</button>
      </div>
    </div>
    <div class="listings-count" id="listings-count"></div>
    <div class="listings" id="listings">
      <div class="loading"><div class="loading-spinner"></div>Running valuations on 87 listings...</div>
    </div>
  </section>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal" id="modal-content"></div>
</div>

<script>
let allListings = [];
let allHoods = [];
let hoodStats = [];
let currentSort = 'price_diff_pct';
let searchQuery = '';
let map, markerMap = {};
let scatterChart, ppsfChart;

// ── Init ──────────────────────────────────────────────────────────
async function init() {
  const [listingsRes, hoodsRes, hoodStatsRes] = await Promise.all([
    fetch('/api/listings?sort=price_diff_pct'),
    fetch('/api/neighborhoods'),
    fetch('/api/neighborhood-stats')
  ]);
  const listingsData = await listingsRes.json();
  const hoodsData = await hoodsRes.json();
  const hoodStatsData = await hoodStatsRes.json();

  allListings = listingsData.listings;
  allHoods = hoodsData.neighborhoods;
  hoodStats = hoodStatsData.neighborhoods;

  const select = document.getElementById('filter-hood');
  allHoods.forEach(h => {
    if (h.active_count > 0) {
      const opt = document.createElement('option');
      opt.value = h.name;
      opt.textContent = `${h.name} (${h.active_count})`;
      select.appendChild(opt);
    }
  });

  renderStats(allListings);
  renderListings(allListings);
  initMap(allListings);
  initCharts(allListings);
  renderNeighborhoods(hoodStats);
}

// ── Helpers ───────────────────────────────────────────────────────
function fmtPrice(p) {
  if (!p) return 'N/A';
  if (p >= 1e6) return '$' + (p / 1e6).toFixed(1) + 'M';
  return '$' + p.toLocaleString();
}
function fmtNum(n) { return n ? n.toLocaleString() : 'N/A'; }

function hoodColor(name) {
  const c = {
    'Malibu Colony': '#3B82F6', 'Carbon Beach': '#F59E0B',
    'Malibu Road': '#10B981', 'Serra Retreat': '#8B5CF6',
    'Malibu Cove Colony': '#EC4899', 'Escondido Beach': '#06B6D4',
    'Point Dume': '#EF4444', 'Broad Beach': '#F97316',
    'Western Malibu': '#6B7280',
  };
  return c[name] || '#6B7280';
}

function assessColor(a) {
  if (a === 'underpriced') return '#22c55e';
  if (a === 'overpriced') return '#ef4444';
  return '#f59e0b';
}

function navTo(el) {
  document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
}

// ── Map ───────────────────────────────────────────────────────────
function initMap(listings) {
  map = L.map('map', { zoomControl: false }).setView([34.028, -118.78], 12);
  L.control.zoom({ position: 'topright' }).addTo(map);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; CartoDB', maxZoom: 18
  }).addTo(map);

  updateMapMarkers(listings);

  const legend = L.control({ position: 'bottomright' });
  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'map-legend');
    const hoods = [...new Set(listings.map(l => l.neighborhood))].sort();
    div.innerHTML = hoods.map(h =>
      `<div><span class="map-legend-dot" style="background:${hoodColor(h)}"></span>${h}</div>`
    ).join('');
    return div;
  };
  legend.addTo(map);
}

function updateMapMarkers(listings) {
  Object.values(markerMap).forEach(m => map.removeLayer(m));
  markerMap = {};

  listings.forEach(l => {
    if (!l.lat || !l.lng) return;
    const assess = l.price_assessment || 'fair';
    const fillColor = assessColor(assess);
    const borderColor = hoodColor(l.neighborhood);
    const radius = Math.max(6, Math.min(14, (l.listed_price || 10e6) / 5e6));

    const marker = L.circleMarker([l.lat, l.lng], {
      radius, fillColor, fillOpacity: 0.85,
      color: borderColor, weight: 2.5, opacity: 1,
    });

    // Tooltip on hover
    const diffStr = l.price_diff_pct != null
      ? (l.price_diff_pct > 0 ? '+' : '') + l.price_diff_pct.toFixed(0) + '%'
      : '';
    const deltaLabel = l.price_diff_pct != null
      ? (l.price_diff_pct > 5 ? 'overpriced' : l.price_diff_pct < -5 ? 'underpriced' : 'fair value')
      : '';
    const deltaColor = l.price_diff_pct > 5 ? '#ef4444' : l.price_diff_pct < -5 ? '#22c55e' : '#f59e0b';

    marker.bindTooltip(`
      <div class="tt-addr">${l.address}</div>
      <div class="tt-prices">
        <span>Listed: ${fmtPrice(l.listed_price)}</span>
        <span>Fair: ${fmtPrice(l.estimated_value)}</span>
      </div>
      <div class="tt-delta" style="color:${deltaColor}">${diffStr} ${deltaLabel}</div>
    `, { className: 'map-tooltip', direction: 'top', offset: [0, -8] });

    // Click: scroll to listing card
    marker.on('click', () => {
      scrollToListing(l.address);
      showDetail(encodeURIComponent(l.address));
    });

    marker.addTo(map);
    markerMap[l.address] = marker;
  });
}

function scrollToListing(address) {
  const card = document.querySelector(`[data-address="${CSS.escape(address)}"]`);
  if (card) {
    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
    card.classList.add('highlighted');
    setTimeout(() => card.classList.remove('highlighted'), 2000);
  }
}

function highlightMarker(address) {
  const m = markerMap[address];
  if (m) {
    m.openTooltip();
    map.panTo(m.getLatLng(), { animate: true });
  }
}

// ── Charts ────────────────────────────────────────────────────────
function initCharts(listings) {
  const withBoth = listings.filter(l => l.listed_price && l.estimated_value);

  const scatterCtx = document.getElementById('scatter-chart').getContext('2d');
  scatterChart = new Chart(scatterCtx, {
    type: 'scatter',
    data: {
      datasets: [{
        label: 'Listings',
        data: withBoth.map(l => ({
          x: l.estimated_value / 1e6, y: l.listed_price / 1e6, label: l.address
        })),
        backgroundColor: withBoth.map(l => assessColor(l.price_assessment) + '99'),
        borderColor: withBoth.map(l => assessColor(l.price_assessment)),
        borderWidth: 1,
        pointRadius: 5, pointHoverRadius: 8,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        x: { title: { display: true, text: 'Fair Value ($M)', color: '#7c7c96', font: { size: 11 } }, grid: { color: '#1a1a24' }, ticks: { color: '#7c7c96' } },
        y: { title: { display: true, text: 'Listed Price ($M)', color: '#7c7c96', font: { size: 11 } }, grid: { color: '#1a1a24' }, ticks: { color: '#7c7c96' } }
      },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => `${ctx.raw.label}: Listed $${ctx.raw.y.toFixed(1)}M / Fair $${ctx.raw.x.toFixed(1)}M` } }
      }
    },
    plugins: [{
      afterDraw(chart) {
        const { ctx, scales: { x, y } } = chart;
        const minVal = Math.min(x.min, y.min);
        const maxVal = Math.max(x.max, y.max);
        ctx.save();
        ctx.strokeStyle = 'rgba(59,130,246,0.25)';
        ctx.lineWidth = 1.5; ctx.setLineDash([6, 4]);
        ctx.beginPath();
        ctx.moveTo(x.getPixelForValue(minVal), y.getPixelForValue(minVal));
        ctx.lineTo(x.getPixelForValue(maxVal), y.getPixelForValue(maxVal));
        ctx.stroke(); ctx.restore();
      }
    }]
  });

  // $/sqft by Neighborhood
  const stats = {};
  listings.forEach(l => {
    if (!l.adjusted_ppsf || !l.neighborhood) return;
    if (!stats[l.neighborhood]) stats[l.neighborhood] = [];
    stats[l.neighborhood].push(l.adjusted_ppsf);
  });
  const hoodNames = Object.keys(stats).sort((a, b) => {
    const medA = stats[a].sort((x,y) => x-y)[Math.floor(stats[a].length/2)];
    const medB = stats[b].sort((x,y) => x-y)[Math.floor(stats[b].length/2)];
    return medB - medA;
  });
  const medians = hoodNames.map(h => {
    const arr = stats[h].sort((a,b) => a-b);
    return arr[Math.floor(arr.length / 2)];
  });

  const ppsfCtx = document.getElementById('ppsf-chart').getContext('2d');
  ppsfChart = new Chart(ppsfCtx, {
    type: 'bar',
    data: {
      labels: hoodNames.map(h => h.length > 16 ? h.slice(0, 14) + '...' : h),
      datasets: [{
        label: 'Median $/sqft',
        data: medians,
        backgroundColor: hoodNames.map(h => hoodColor(h) + 'BB'),
        borderColor: hoodNames.map(h => hoodColor(h)),
        borderWidth: 1, borderRadius: 4,
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      indexAxis: 'y',
      scales: {
        x: { grid: { color: '#1a1a24' }, ticks: { color: '#7c7c96', callback: v => '$' + v.toLocaleString() } },
        y: { grid: { display: false }, ticks: { color: '#7c7c96', font: { size: 11 } } }
      },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => '$' + ctx.raw.toLocaleString() + '/sqft' } }
      }
    }
  });
}

// ── Neighborhoods ─────────────────────────────────────────────────
function renderNeighborhoods(hoods) {
  document.getElementById('hood-grid').innerHTML = hoods.map(h => {
    const deal = h.best_deal;
    const dealHtml = deal ? `
      <div class="hood-deal" onclick="event.stopPropagation();showDetail('${encodeURIComponent(deal.address)}')">
        <div class="hood-deal-label">Best Deal</div>
        <div class="hood-deal-addr">${deal.address}</div>
        <div class="hood-deal-diff">${fmtPrice(deal.listed_price)} &middot; ${deal.price_diff_pct.toFixed(0)}% below fair value</div>
      </div>
    ` : '';

    return `
      <div class="hood-card">
        <div class="hood-card-header">
          <div class="hood-color-bar" style="background:${h.color}"></div>
          <div>
            <div class="hood-card-name">${h.name}</div>
            <div style="font-size:12px;color:var(--text-dim)">${h.active_count} active listing${h.active_count !== 1 ? 's' : ''}</div>
          </div>
        </div>
        <div class="hood-card-desc">${h.description}</div>
        <div class="hood-stats-grid">
          <div class="hood-stat">
            <div class="hood-stat-label">Med. Price</div>
            <div class="hood-stat-value">${fmtPrice(h.median_list_price)}</div>
          </div>
          <div class="hood-stat">
            <div class="hood-stat-label">Med. $/sqft</div>
            <div class="hood-stat-value">${h.median_ppsf ? '$' + h.median_ppsf.toLocaleString() : 'N/A'}</div>
          </div>
          <div class="hood-stat">
            <div class="hood-stat-label">Avg. DOM</div>
            <div class="hood-stat-value">${h.avg_dom || 'N/A'}</div>
          </div>
          <div class="hood-stat">
            <div class="hood-stat-label">Fair Value</div>
            <div class="hood-stat-value">${fmtPrice(h.median_fair_value)}</div>
          </div>
        </div>
        ${dealHtml}
      </div>
    `;
  }).join('');
}

// ── Stats ─────────────────────────────────────────────────────────
function renderStats(listings) {
  const withValues = listings.filter(l => l.estimated_value);
  const underpriced = listings.filter(l => l.price_assessment === 'underpriced').length;
  const overpriced = listings.filter(l => l.price_assessment === 'overpriced').length;
  const medPrices = listings.map(l => l.listed_price || 0).sort((a,b) => a-b);
  const medPrice = medPrices[Math.floor(medPrices.length/2)] || 0;
  const medianDiff = withValues.length
    ? withValues.map(l => l.price_diff_pct || 0).sort((a,b) => a-b)[Math.floor(withValues.length/2)]
    : 0;

  document.getElementById('stats-bar').innerHTML = `
    <div class="stat"><div class="stat-label">Active Listings</div><div class="stat-value">${listings.length}</div></div>
    <div class="stat"><div class="stat-label">Median Price</div><div class="stat-value">${fmtPrice(medPrice)}</div></div>
    <div class="stat"><div class="stat-label">Underpriced</div><div class="stat-value green">${underpriced}</div></div>
    <div class="stat"><div class="stat-label">Overpriced</div><div class="stat-value red">${overpriced}</div></div>
    <div class="stat"><div class="stat-label">Median vs Fair</div><div class="stat-value ${medianDiff < 0 ? 'green' : medianDiff > 0 ? 'red' : ''}">${medianDiff > 0 ? '+' : ''}${medianDiff.toFixed(0)}%</div></div>
  `;
}

// ── Listings ──────────────────────────────────────────────────────
function renderListings(listings) {
  const container = document.getElementById('listings');
  const countEl = document.getElementById('listings-count');
  countEl.textContent = `${listings.length} listing${listings.length !== 1 ? 's' : ''}`;

  if (!listings.length) {
    container.innerHTML = '<div class="loading">No listings match your filters.</div>';
    return;
  }

  container.innerHTML = listings.map(l => {
    const diffClass = (l.price_diff_pct || 0) < 0 ? 'negative' : 'positive';
    const assessClass = l.price_assessment || 'fair';
    const landPct = l.value_breakdown?.land_pct || 60;
    const color = hoodColor(l.neighborhood);
    const thumb = (l.images && l.images[0]) || '';

    const tags = [];
    if (l.ocean_facing === true) tags.push('<span class="tag tag-ocean">Ocean</span>');
    if (l.ocean_facing === false) tags.push('<span class="tag tag-mtn">Mtn Side</span>');
    if (l.is_land_parcel) tags.push('<span class="tag tag-land">Land</span>');
    if (l.confidence === 'low') tags.push('<span class="tag tag-low">Low Conf</span>');

    const kwMap = {
      ocean_view: ['Ocean View', 'kw-ocean'], beachfront: ['Beach', 'kw-beach'],
      oceanfront: ['Oceanfront', 'kw-beach'], no_view: ['No View', 'kw-noview'],
      burned: ['Fire', 'kw-burned'], new_build: ['New', 'kw-new'],
      bluff: ['Bluff', 'kw-bluff'], pool: ['Pool', 'kw-pool'],
      gated: ['Gated', 'kw-gated'],
    };
    (l.scraped_keywords || []).filter(k => kwMap[k]).slice(0, 2).forEach(kw => {
      const [label, cls] = kwMap[kw];
      tags.push(`<span class="tag-kw tag-${cls}">${label}</span>`);
    });

    const thumbHtml = thumb
      ? `<img class="listing-thumb" src="${thumb}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=\\'listing-thumb-placeholder\\'>&#9633;</div>'">`
      : '<div class="listing-thumb-placeholder">&#9633;</div>';

    return `
      <div class="listing-card" data-address="${l.address}" onclick="showDetail('${encodeURIComponent(l.address)}')">
        <div class="listing-thumb-wrap">${thumbHtml}</div>
        <div class="listing-info">
          <h3>${l.address || 'Unknown'}</h3>
          <div class="meta">${l.beds || '?'} bd / ${l.baths || '?'} ba &middot; ${fmtNum(l.sqft)} sqft &middot; Built ${l.year_built || '?'} &middot; ${l.dom || '?'} DOM</div>
          <div style="display:flex;gap:4px;flex-wrap:wrap;align-items:center">
            <span class="listing-hood" style="background:${color}15;color:${color}">${l.neighborhood}</span>
            ${tags.join('')}
          </div>
        </div>
        <div class="listing-prices">
          <div class="listed-price">${fmtPrice(l.listed_price)}</div>
          <div class="est-value">Fair: ${fmtPrice(l.estimated_value)}</div>
        </div>
        <div class="listing-assessment">
          <div class="badge ${assessClass}">${assessClass}</div>
          <div class="diff-pct ${diffClass}">${l.price_diff_pct != null ? (l.price_diff_pct > 0 ? '+' : '') + l.price_diff_pct.toFixed(0) + '%' : ''}</div>
        </div>
        <div class="listing-breakdown">
          <div class="land-bar"><div class="land-bar-fill" style="width:${landPct}%"></div></div>
          <div class="breakdown-labels"><span>Land ${landPct}%</span><span>Build ${100 - landPct}%</span></div>
        </div>
      </div>`;
  }).join('');
}

// ── Detail Modal ──────────────────────────────────────────────────
async function showDetail(encodedAddress) {
  const address = decodeURIComponent(encodedAddress);
  const overlay = document.getElementById('modal-overlay');
  const modal = document.getElementById('modal-content');
  modal.innerHTML = '<div class="modal-body"><div class="loading"><div class="loading-spinner"></div></div></div>';
  overlay.classList.add('open');

  const res = await fetch('/api/listing/' + encodeURIComponent(address));
  if (!res.ok) { overlay.classList.remove('open'); return; }
  const d = await res.json();

  const assessClass = d.price_assessment || 'fair';
  const ca = d.construction_analysis || {};
  const images = (d.images || []).filter(Boolean);

  // Tags
  const modalTags = [];
  if (d.ocean_facing === true) modalTags.push('<span class="tag tag-ocean" style="font-size:11px;padding:3px 10px">Ocean-Facing</span>');
  if (d.ocean_facing === false) modalTags.push('<span class="tag tag-mtn" style="font-size:11px;padding:3px 10px">Mountain Side</span>');
  if (d.is_land_parcel) modalTags.push('<span class="tag tag-land" style="font-size:11px;padding:3px 10px">Land Parcel</span>');
  if (d.confidence === 'low') modalTags.push('<span class="tag tag-low" style="font-size:11px;padding:3px 10px">Low Confidence</span>');
  const kwTags = (d.scraped_keywords || []).map(kw => {
    const m = { ocean_view:['Ocean View','kw-ocean'], beachfront:['Beachfront','kw-beach'], oceanfront:['Oceanfront','kw-beach'], no_view:['No Ocean View','kw-noview'], mountain_view:['Mountain View','kw-noview'], new_build:['New Build','kw-new'], renovated:['Renovated','kw-new'], burned:['Fire Damage','kw-burned'], teardown:['Teardown','kw-burned'], pool:['Pool','kw-pool'], gated:['Gated','kw-gated'], bluff:['Blufftop','kw-bluff'], guest_house:['Guest House','kw-guest'] };
    const [label, cls] = m[kw] || [kw, 'kw-ocean'];
    return `<span class="tag-kw tag-${cls}" style="font-size:11px">${label}</span>`;
  }).join('');

  // Carousel
  let carouselHtml = '';
  if (images.length > 0) {
    const slides = images.map((src, i) =>
      `<div class="carousel-slide"><img src="${src}" alt="Property photo ${i+1}" onerror="this.parentElement.style.display='none'"></div>`
    ).join('');
    const dots = images.map((_, i) =>
      `<button class="carousel-dot${i === 0 ? ' active' : ''}" onclick="carouselGo(${i})"></button>`
    ).join('');
    carouselHtml = `
      <div class="carousel" id="carousel">
        <div class="carousel-track" id="carousel-track">${slides}</div>
        ${images.length > 1 ? `
          <button class="carousel-btn prev" onclick="carouselPrev()">&#8249;</button>
          <button class="carousel-btn next" onclick="carouselNext()">&#8250;</button>
          <div class="carousel-dots">${dots}</div>
        ` : ''}
      </div>`;
  } else {
    carouselHtml = '<div class="no-images-placeholder">No photos available</div>';
  }

  // Why This Price
  const whyHtml = d.why_this_price ? `
    <div class="why-price-box">
      <div class="why-price-label">Why This Price</div>
      ${d.why_this_price}
    </div>
  ` : '';

  const desc = d.description ? `<div class="listing-description">${d.description}</div>` : '';

  modal.innerHTML = `
    <button class="modal-close" onclick="closeModal()">&times;</button>
    ${carouselHtml}
    <div class="modal-body">
      <h2>${d.address}</h2>
      <div class="address-meta">${d.neighborhood} &middot; ${d.beds||'?'} bd / ${d.baths||'?'} ba &middot; ${fmtNum(d.sqft)} sqft &middot; ${fmtNum(d.lot_size)} sqft lot &middot; Built ${d.year_built||'Unknown'}</div>
      ${modalTags.length || kwTags ? '<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px">' + modalTags.join('') + kwTags + '</div>' : ''}

      <div class="valuation-hero">
        <div class="val-col">
          <h4>Listed Price</h4>
          <div class="big-num">${fmtPrice(d.listed_price)}</div>
        </div>
        <div class="val-col">
          <h4>Estimated Fair Value</h4>
          <div class="big-num" style="color:var(--accent)">${fmtPrice(d.estimated_value)}</div>
          <span class="badge ${assessClass}" style="margin-top:8px">${assessClass} ${d.price_diff_pct != null ? '(' + (d.price_diff_pct > 0 ? '+' : '') + d.price_diff_pct.toFixed(1) + '%)' : ''}</span>
        </div>
      </div>

      ${whyHtml}
      ${desc}

      <div class="modal-stat-grid">
        <div class="stat"><div class="stat-label">Adjusted $/sqft</div><div class="stat-value">$${fmtNum(d.adjusted_ppsf)}</div></div>
        <div class="stat"><div class="stat-label">Land Value</div><div class="stat-value">${fmtPrice(d.value_breakdown?.land_value)} (${d.value_breakdown?.land_pct}%)</div></div>
        <div class="stat"><div class="stat-label">Construction</div><div class="stat-value">${ca.multiplier?.toFixed(2)||'--'}x</div></div>
      </div>

      <div class="reasoning-box">${d.reasoning||''}</div>

      <div class="comps-section">
        <h3>Comparable Sales (${d.comp_count||0})</h3>
        <div class="comp-row comp-header"><span>Address</span><span>Price</span><span>$/sqft</span><span>Built</span></div>
        ${(d.comps||[]).map(c => `<div class="comp-row"><span>${c.address}</span><span>${fmtPrice(c.price)}</span><span>$${fmtNum(c.price_per_sqft)}</span><span>${c.year_built||'?'}</span></div>`).join('')}
      </div>

      <div class="modal-actions">
        ${d.url ? `<a href="${d.url}" target="_blank" class="btn btn-primary">View on Redfin</a>` : ''}
        <button class="btn btn-ghost" onclick="closeModal()">Close</button>
      </div>
    </div>
  `;

  // Init carousel scroll listener
  if (images.length > 1) {
    const track = document.getElementById('carousel-track');
    if (track) {
      track.addEventListener('scroll', () => {
        const idx = Math.round(track.scrollLeft / track.clientWidth);
        document.querySelectorAll('.carousel-dot').forEach((dot, i) => {
          dot.classList.toggle('active', i === idx);
        });
      });
    }
  }
}

function carouselGo(idx) {
  const track = document.getElementById('carousel-track');
  if (track) track.scrollTo({ left: idx * track.clientWidth, behavior: 'smooth' });
}
function carouselPrev() {
  const track = document.getElementById('carousel-track');
  if (!track) return;
  const idx = Math.round(track.scrollLeft / track.clientWidth);
  carouselGo(Math.max(0, idx - 1));
}
function carouselNext() {
  const track = document.getElementById('carousel-track');
  if (!track) return;
  const idx = Math.round(track.scrollLeft / track.clientWidth);
  const max = track.children.length - 1;
  carouselGo(Math.min(max, idx + 1));
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
document.getElementById('modal-overlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Search ────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const searchDropdown = document.getElementById('search-dropdown');
let searchTimeout;

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = searchInput.value.toLowerCase().trim();
    searchQuery = q;

    if (q.length < 2) {
      searchDropdown.classList.remove('open');
      applyFilters();
      return;
    }

    const matches = allListings.filter(l => l.address.toLowerCase().includes(q)).slice(0, 8);
    if (!matches.length) {
      searchDropdown.classList.remove('open');
      applyFilters();
      return;
    }

    searchDropdown.innerHTML = matches.map(l =>
      `<div class="search-item" onmousedown="selectSearchResult('${encodeURIComponent(l.address)}')">
        <span>${l.address}</span>
        <span class="search-item-price">${fmtPrice(l.listed_price)}</span>
      </div>`
    ).join('');
    searchDropdown.classList.add('open');
    applyFilters();
  }, 120);
});

searchInput.addEventListener('blur', () => setTimeout(() => searchDropdown.classList.remove('open'), 200));

function selectSearchResult(encoded) {
  searchDropdown.classList.remove('open');
  searchInput.value = '';
  searchQuery = '';
  applyFilters();
  const addr = decodeURIComponent(encoded);
  highlightMarker(addr);
  scrollToListing(addr);
}

// ── Filters ───────────────────────────────────────────────────────
function applyFilters() {
  let filtered = [...allListings];
  const hood = document.getElementById('filter-hood').value;
  const assessment = document.getElementById('filter-assessment').value;

  if (hood) filtered = filtered.filter(l => l.neighborhood === hood);
  if (assessment) filtered = filtered.filter(l => l.price_assessment === assessment);
  if (searchQuery.length >= 2) {
    filtered = filtered.filter(l => l.address.toLowerCase().includes(searchQuery));
  }

  filtered.sort((a, b) => {
    const av = a[currentSort] ?? 0, bv = b[currentSort] ?? 0;
    return currentSort === 'price_diff_pct' ? av - bv : bv - av;
  });

  renderStats(filtered);
  renderListings(filtered);
  updateMapMarkers(filtered);

  // Highlight matching markers during search
  if (searchQuery.length >= 2) {
    Object.entries(markerMap).forEach(([addr, m]) => {
      if (addr.toLowerCase().includes(searchQuery)) {
        m.setStyle({ weight: 4, opacity: 1 });
      }
    });
  }
}

document.getElementById('filter-hood').addEventListener('change', () => {
  applyFilters();
  const hood = document.getElementById('filter-hood').value;
  const activeMarkers = Object.values(markerMap);
  if (hood && activeMarkers.length) {
    const group = L.featureGroup(activeMarkers);
    map.fitBounds(group.getBounds().pad(0.1));
  } else if (map) {
    map.setView([34.028, -118.78], 12);
  }
});
document.getElementById('filter-assessment').addEventListener('change', applyFilters);

document.querySelectorAll('.sort-pill').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSort = btn.dataset.sort;
    applyFilters();
  });
});

init();
</script>
</body>
</html>
