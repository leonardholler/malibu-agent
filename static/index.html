<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Malibu Agent</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #0a0a0f;
  color: #e8e8f0;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

header {
  border-bottom: 1px solid #1e1e2e;
  padding: 16px 32px;
  display: flex;
  align-items: center;
  gap: 24px;
}
header h1 { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
header select {
  background: #13131c;
  color: #e8e8f0;
  border: 1px solid #1e1e2e;
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  outline: none;
}
header select:focus { border-color: #3b82f6; }
.count { font-size: 13px; color: #6b6b80; margin-left: auto; }

.grid {
  max-width: 1400px;
  margin: 24px auto;
  padding: 0 32px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 12px;
}

.card {
  background: #13131c;
  border: 1px solid #1e1e2e;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s;
}
.card:hover { border-color: #3b82f6; }

.card-img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  display: block;
  background: #1a1a24;
}
.card-placeholder {
  width: 100%;
  height: 180px;
  background: #1a1a24;
}

.card-body { padding: 14px 16px; }
.card-addr {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-hood {
  font-size: 11px;
  color: #6b6b80;
  margin-top: 2px;
}
.card-prices {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-top: 10px;
}
.card-listed { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
.card-est { font-size: 13px; color: #6b6b80; }
.card-delta {
  display: inline-block;
  font-size: 13px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 4px;
  margin-top: 8px;
}
.delta-under { background: rgba(34,197,94,0.12); color: #22c55e; }
.delta-over  { background: rgba(239,68,68,0.12); color: #ef4444; }
.delta-fair  { background: rgba(136,136,160,0.08); color: #6b6b80; }

.loading {
  text-align: center;
  padding: 80px 20px;
  color: #6b6b80;
  grid-column: 1 / -1;
}
</style>
</head>
<body>

<header>
  <h1>Malibu Agent</h1>
  <select id="hood-filter">
    <option value="">All Neighborhoods</option>
  </select>
  <span class="count" id="count"></span>
</header>

<div class="grid" id="grid">
  <div class="loading">Loading...</div>
</div>

<script>
let allListings = [];

async function init() {
  const res = await fetch('/api/listings?sort=price_diff_pct');
  const data = await res.json();
  allListings = data.listings;

  const hoods = [...new Set(allListings.map(l => l.neighborhood))].sort();
  const select = document.getElementById('hood-filter');
  hoods.forEach(h => {
    const n = allListings.filter(l => l.neighborhood === h).length;
    const opt = document.createElement('option');
    opt.value = h;
    opt.textContent = h + ' (' + n + ')';
    select.appendChild(opt);
  });

  render(allListings);
}

function fmtPrice(p) {
  if (!p) return 'N/A';
  return '$' + (p / 1e6).toFixed(1) + 'M';
}

function render(listings) {
  document.getElementById('count').textContent = listings.length + ' listings';
  const grid = document.getElementById('grid');

  if (!listings.length) {
    grid.innerHTML = '<div class="loading">No listings match.</div>';
    return;
  }

  grid.innerHTML = listings.map(l => {
    const thumb = (l.images && l.images[0]) || '';
    const imgHtml = thumb
      ? '<img class="card-img" src="' + thumb + '" loading="lazy" onerror="this.outerHTML=\'<div class=card-placeholder></div>\'">'
      : '<div class="card-placeholder"></div>';

    const diff = l.price_diff_pct;
    let deltaHtml = '';
    if (diff != null) {
      const cls = diff < -5 ? 'delta-under' : diff > 5 ? 'delta-over' : 'delta-fair';
      const label = diff < -5 ? 'underpriced' : diff > 5 ? 'overpriced' : 'fair value';
      deltaHtml = '<div class="card-delta ' + cls + '">' + (diff > 0 ? '+' : '') + diff.toFixed(0) + '% ' + label + '</div>';
    }

    return '<div class="card">'
      + imgHtml
      + '<div class="card-body">'
      + '<div class="card-addr">' + (l.address || '') + '</div>'
      + '<div class="card-hood">' + (l.neighborhood || '') + '</div>'
      + '<div class="card-prices">'
      + '<span class="card-listed">' + fmtPrice(l.listed_price) + '</span>'
      + '<span class="card-est">Fair: ' + fmtPrice(l.estimated_value) + '</span>'
      + '</div>'
      + deltaHtml
      + '</div></div>';
  }).join('');
}

document.getElementById('hood-filter').addEventListener('change', function() {
  const v = this.value;
  render(v ? allListings.filter(l => l.neighborhood === v) : allListings);
});

init();
</script>
</body>
</html>
